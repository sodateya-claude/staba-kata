<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタバ肩叩きシミュレーター</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: Georgia, 'Times New Roman', serif;
  background: #ffffff;
  color: #111111;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
}
.container {
  width: 100%;
  max-width: 400px;
  padding: 40px 20px 60px;
}
h1 {
  font-size: 1.3rem;
  font-weight: normal;
  letter-spacing: 0.03em;
  margin-bottom: 8px;
}
.subtitle {
  font-size: 0.82rem;
  line-height: 1.7;
  margin-bottom: 48px;
}
.label {
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  margin-bottom: 16px;
}

/* カテゴリ選択 */
.categories {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 36px;
}
.cat-btn {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 0.85rem;
  padding: 10px 16px;
  background: #fff;
  color: #111;
  border: 1.5px solid #111;
  border-radius: 0;
  cursor: pointer;
}
.cat-btn:hover { background: #fff; }
.cat-btn.selected {
  background: #111;
  color: #fff;
}

/* 金額入力 */
.input-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 40px;
}
.amount-input {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 1.8rem;
  width: 100%;
  border: none;
  border-bottom: 1.5px solid #111;
  border-radius: 0;
  outline: none;
  padding: 8px 0;
  background: transparent;
  color: #111;
  -moz-appearance: textfield;
}
.amount-input::-webkit-outer-spin-button,
.amount-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.unit {
  font-size: 1.1rem;
  white-space: nowrap;
}

.tap-btn {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 0.95rem;
  padding: 14px 32px;
  background: #111;
  color: #fff;
  border: 1.5px solid #111;
  border-radius: 0;
  cursor: pointer;
  display: block;
  width: 100%;
}
.tap-btn:hover { background: #111; }
.error-msg {
  font-size: 0.8rem;
  color: #111;
  text-align: center;
  margin-top: 10px;
  min-height: 1.2em;
}

/* シーン画面 */
.scene {
  min-height: 60vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.scene-line {
  font-size: 0.92rem;
  line-height: 1.8;
  margin-bottom: 20px;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.scene-line.visible { opacity: 1; }
.scene-line.dialogue {
  padding-left: 1em;
  text-indent: -1em;
}
.scene-line.reaction {
  font-weight: bold;
}

/* 結果画面 */
.result-box {
  border: 1.5px solid #111;
  padding: 24px 20px;
  margin-top: 20px;
  margin-bottom: 0;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.result-box.visible { opacity: 1; }
.result-fulltext {
  font-size: 0.88rem;
  line-height: 1.9;
}

.buttons-area {
  margin-top: 32px;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.buttons-area.visible { opacity: 1; }
.share-btn {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 0.95rem;
  padding: 14px 32px;
  background: #111;
  color: #fff;
  border: 1.5px solid #111;
  border-radius: 0;
  cursor: pointer;
  display: block;
  width: 100%;
  text-decoration: none;
  text-align: center;
}
.share-btn:hover { background: #111; }
.retry-btn {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 0.9rem;
  padding: 12px 32px;
  background: #fff;
  color: #111;
  border: 1.5px solid #111;
  border-radius: 0;
  cursor: pointer;
  display: block;
  width: 100%;
  margin-top: 10px;
}
.credit {
  font-size: 0.7rem;
  text-align: center;
  margin-top: 32px;
  opacity: 0.5;
}
.hidden { display: none; }
</style>
</head>
<body>
<div class="container">

  <!-- 入力画面 -->
  <div id="inputScreen">
    <h1>スタバ肩叩き<br>シミュレーター</h1>
    <p class="subtitle">
      スタバで大学生がチャートを<br>
      眺めています。<br><br>
      あなたは何を伝えますか？
    </p>

    <div class="label">CATEGORY</div>
    <div class="categories" id="categories"></div>

    <div class="label">AMOUNT</div>
    <div class="input-row">
      <input type="text" class="amount-input" id="amountInput" placeholder="1000" inputmode="numeric">
      <span class="unit">万円</span>
    </div>

    <button class="tap-btn" id="tapBtn" onclick="startScene()">肩を叩く</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- シーン画面 -->
  <div id="sceneScreen" class="hidden">
    <div class="scene" id="sceneArea"></div>
    <div class="result-box" id="resultBox"></div>
    <div class="buttons-area" id="buttonsArea">
      <a class="share-btn" id="shareBtn" target="_blank" rel="noopener">X でシェア</a>
      <button class="retry-btn" onclick="retry()">金額を変えて再挑戦</button>
      <div class="credit">@claude_sodateya</div>
    </div>
  </div>

</div>

<script>
// カテゴリ定義

// リアクション定義（万円単位）

    { max: 800,     kettara: '「お、いいですね」って軽くうなずかれた',                     last: 'ちょっとだけ尊敬される部類だよね？' },
    { max: 1000,    kettara: 'むっちゃ驚いてた',                                          last: 'すごい部類だよね？' },
    { max: 2000,    kettara: '「え、マジっすか」ってスマホ置いてこっち見てきた',            last: 'ガチで驚かれる部類だよね？' },
    { max: 3000,    kettara: '「何に投資してるんですか」ってめっちゃ食いついてきた',        last: '教えを請われる部類だよね？' },
    { max: 5000,    kettara: '「...なんで僕にそれ言うんですか？」って若干キレてた',         last: '嫉妬される部類だよね？' },
    { max: 7000,    kettara: '荷物まとめ始めた。明らかにこっちを警戒してる',                last: '不審者だと思われる部類だよね？' },
    { max: 10000,   kettara: '「すみません」って足早に席を移られた',                       last: 'ガチで逃げられる部類だよね？' },
    { max: 30000,   kettara: '店員に「あの人に話しかけられたんですけど...」って相談してた',  last: '店員案件になる部類だよね？' },
    { max: 50000,   kettara: '店員が「お客様、他のお客様のご迷惑に...」って飛んできた',     last: '出禁にされる部類だよね？' },
    { max: 100000,  kettara: '気づいたら店の外にパトカーが停まってた',                     last: '警察沙汰になる部類だよね？' },
    { max: Infinity, kettara: '翌日のニュースに「スタバで資産を叫ぶ不審者」って出てた',    last: 'ニュースになる部類だよね？' }
  ],
  income: [
    { max: -1,      kettara: '「年収マイナスってあるんですか...？」って真顔で聞かれた',     last: '年収マイナスって概念から説明が必要な部類だよね？' },
    { max: 0,       kettara: '「あ、無職の方ですか？」って普通に聞かれた',                  last: '無職って隠したほうがいい部類だよね？' },
    { max: 50,      kettara: '「バイトですか？僕もです」って親近感持たれた',                 last: '大学生のバイト代と変わらない部類だよね？' },
    { max: 100,     kettara: '「あ、フリーターですか？」って聞かれた',                      last: 'フリーターだと思われる部類だよね？' },
    { max: 200,     kettara: '「新卒くらいですか？」って言われた',                          last: '新卒レベルの部類だよね？' },
    { max: 300,     kettara: '「まあ、普通ですよね」って真顔で返された',                    last: '特に驚かれない部類だよね？' },
    { max: 400,     kettara: '「あ、いいですね」って社交辞令で返された',                    last: 'お世辞ギリギリの部類だよね？' },
    { max: 500,     kettara: '「おお」ってちょっとだけ反応してくれた',                      last: 'ちょっとだけ反応される部類だよね？' },
    { max: 700,     kettara: '「え、すごくないですか？」って目を見開いてた',                 last: '素直に驚かれる部類だよね？' },
    { max: 1000,    kettara: 'むっちゃ驚いてた',                                           last: 'すごい部類だよね？' },
    { max: 1500,    kettara: '「え、何の仕事ですか？」ってチャート閉じてこっち向いてきた',   last: '職業を聞かれる部類だよね？' },
    { max: 2000,    kettara: '「それって手取りですか...？」って震え声で聞いてきた',          last: '手取りかどうか確認される部類だよね？' },
    { max: 3000,    kettara: '「...なんで僕に言うんですか」って急に冷たくなった',            last: 'マウントだと思われる部類だよね？' },
    { max: 5000,    kettara: '無言で荷物まとめて帰っていった',                              last: '人を無言にさせる部類だよね？' },
    { max: 8000,    kettara: '店員に「変な人がいます」って通報されてた',                     last: '通報される部類だよね？' },
    { max: 10000,   kettara: '大学生が就活アプリ閉じてたけど、多分関係ない',                 last: '人の将来を不安にさせる部類だよね？' },
    { max: 50000,   kettara: '「嘘ですよね？」って3回聞き返された',                         last: '信じてもらえない部類だよね？' },
    { max: Infinity, kettara: '翌日そのスタバが「年収マウントおじさん出没注意」ってXでバズってた', last: 'ネットニュースになる部類だよね？' }
  ],
  loss: [
    { max: 0,       kettara: '「え、含み益ですか？」って聞き返された',                      last: '含み損なのに得してるって紛らわしい部類だよね？' },
    { max: 5,       kettara: '「あ、そうですか...」って興味なさそうにうなずかれた',           last: 'コーヒー代くらいの含み損って誰も興味ない部類だよね？' },
    { max: 10,      kettara: '「僕もゲームの課金でそれくらい使いました」って言われた',        last: '課金と同レベルの部類だよね？' },
    { max: 50,      kettara: '「あー、ありますよね」って軽く流された',                       last: 'あるあるで済まされる部類だよね？' },
    { max: 100,     kettara: '「まだ勉強代ですよ」って慰められた',                          last: '勉強代で済む部類だよね？' },
    { max: 300,     kettara: '「うわ、結構やられてますね...」って苦笑いされた',               last: 'ちょっと引かれる部類だよね？' },
    { max: 500,     kettara: '「大丈夫ですか？」ってガチで心配された',                       last: '本気で心配される部類だよね？' },
    { max: 1000,    kettara: '自分のフラペチーノ差し出してきた',                             last: 'フラペチーノで慰められる部類だよね？' },
    { max: 2000,    kettara: '「損切りしたほうが...」って急にアドバイスしてきた',              last: '見ず知らずの大学生に助言される部類だよね？' },
    { max: 3000,    kettara: '無言で自分のチャートを閉じてた',                               last: '他人にチャートを閉じさせる部類だよね？' },
    { max: 5000,    kettara: '目が潤んでた。俺の含み損に。',                                 last: '赤の他人を泣かせる部類だよね？' },
    { max: 8000,    kettara: '「親には言いました？」って真剣な顔で聞いてきた',                last: '家族会議を勧められる部類だよね？' },
    { max: 10000,   kettara: '泣いてた。そしてなぜか俺も泣いてた',                           last: 'スタバで一緒に泣く部類だよね？' },
    { max: 30000,   kettara: '震える手で投資アプリをアンインストールし始めた',                 last: '他人に投資をやめさせる部類だよね？' },
    { max: 50000,   kettara: '「ちょっと電話してきます」って親に電話してた',                   last: '他人が親に連絡する部類だよね？' },
    { max: 100000,  kettara: 'スタバの店内が静まり返った',                                   last: 'スタバを静寂に包む部類だよね？' },
    { max: Infinity, kettara: '隣のテーブルの人まで泣いてた',                                last: '半径5メートルを悲しみで包む部類だよね？' }
  ],
  debt: [
    { max: 0,       kettara: '「え、借金ゼロなんですか」って逆に驚かれた',                   last: '借金ゼロって今どき珍しい部類だよね？' },
    { max: 30,      kettara: '「あ、僕もサブスク溜まってます」って共感された',                 last: 'サブスク程度の部類だよね？' },
    { max: 50,      kettara: '「奨学金ですか？同じです」って仲間意識持たれた',                 last: '大学生あるあるの部類だよね？' },
    { max: 100,     kettara: '「リボ払いですか？」って聞かれた',                              last: 'リボ払いを疑われる部類だよね？' },
    { max: 200,     kettara: '「まあ、車のローンとかありますよね」って慰められた',              last: 'ローンで説明がつく部類だよね？' },
    { max: 300,     kettara: '「まだ全然返せますよ」って励まされた',                          last: 'まだ励ましてもらえる部類だよね？' },
    { max: 500,     kettara: '「え、返せるんですか...？」ってちょっと引いてた',               last: 'ちょっと引かれる部類だよね？' },
    { max: 800,     kettara: '自分のフラペチーノ差し出してきた',                              last: 'フラペチーノで慰められる部類だよね？' },
    { max: 1000,    kettara: '「債務整理って知ってます？」って急にガチトーンになった',          last: '法的手段を勧められる部類だよね？' },
    { max: 2000,    kettara: '父親の名刺渡された。弁護士らしい。',                           last: '弁護士を紹介される部類だよね？' },
    { max: 3000,    kettara: '「なんでスタバ来てるんですか...？」ってガチで聞かれた',          last: 'スタバにいることを疑問視される部類だよね？' },
    { max: 5000,    kettara: '大学生が震えてた。俺の借金に。',                               last: '赤の他人を震えさせる部類だよね？' },
    { max: 8000,    kettara: '「嘘ですよね？」って3回聞き返された',                           last: '信じてもらえない部類だよね？' },
    { max: 10000,   kettara: '大学生がそっと自分の財布をカバンの奥にしまった',                 last: '警戒される部類だよね？' },
    { max: 30000,   kettara: 'スタバ出てった。「将来について考え直す」らしい',                  last: '他人の人生観を変える部類だよね？' },
    { max: 50000,   kettara: '泣きながら親に電話してた。「真面目に生きる」って言ってた',        last: '他人を更生させる部類だよね？' },
    { max: 100000,  kettara: '店内の全員がこっち見てた',                                     last: 'スタバの注目を一身に集める部類だよね？' },
    { max: Infinity, kettara: '翌日そのスタバに「借金おじさんに注意」って貼り紙されてた',      last: '伝説になる部類だよね？' }
  ]
};

let selectedCat = null;

// カテゴリボタン生成
const catEl = document.getElementById('categories');
cats.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn';
  btn.textContent = c.label;
  btn.onclick = () => selectCat(c.id, btn);
  catEl.appendChild(btn);
});

function selectCat(id, btn) {
  selectedCat = id;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// デフォルト選択
selectCat('asset', catEl.children[0]);

const amountInput = document.getElementById('amountInput');

// 金額フォーマット
function formatAmount(num) {
  if (isNaN(num)) num = 0;
  const abs = Math.abs(num);
  if (abs >= 10000) {
    const oku = Math.floor(abs / 10000);
    const man = abs % 10000;
    let s = oku.toLocaleString() + '億';
    if (man > 0) s += man.toLocaleString() + '万';
    return (num < 0 ? '-' : '') + s + '円';
  }
  return num.toLocaleString() + '万円';
}

// リアクション取得
function getReaction(catId, amount) {
  const list = reactions[catId];
  for (const r of list) {
    if (amount <= r.max) return r;
  }
  return list[list.length - 1];
}

// シーン開始
function startScene() {
  var errorEl = document.getElementById('errorMsg');
  errorEl.textContent = '';
  var catId = selectedCat;
  var cat = cats.find(function(c) { return c.id === catId; });
  var raw = amountInput.value.replace(/[^\d\-]/g, '');
  if (raw === '' || raw === '-') {
    errorEl.textContent = '金額を入力してください';
    return;
  }
  var amount = parseInt(raw, 10);
  if (isNaN(amount)) {
    errorEl.textContent = '金額を入力してください';
    return;
  }
  const reaction = getReaction(catId, amount);
  const formatted = formatAmount(amount);

  document.getElementById('inputScreen').classList.add('hidden');
  document.getElementById('sceneScreen').classList.remove('hidden');

  const area = document.getElementById('sceneArea');
  area.innerHTML = '';

  // 元ネタ構文に沿ったシーンを構築
  const lines = [
    { text: '今日、スタバで' + cat.scene + '大学生がいたから、肩叩いて', cls: '' },
    { text: '「あの、' + cat.prefix + formatted + 'です」', cls: 'dialogue' },
    { text: 'って言ったら' + reaction.kettara, cls: 'reaction' },
    { text: '最近' + cat.topic + '人増えてきたけど、やっぱり一般人からしたら' + cat.label + formatted + 'って' + reaction.last, cls: '' }
  ];

  // 台詞を順番に表示
  lines.forEach((l, i) => {
    const div = document.createElement('div');
    div.className = 'scene-line ' + l.cls;
    div.textContent = l.text;
    area.appendChild(div);
  });

  const allLines = area.querySelectorAll('.scene-line');
  let delay = 300;
  allLines.forEach((el, i) => {
    setTimeout(() => el.classList.add('visible'), delay);
    delay += i === 1 ? 800 : 600;
  });

  // 結果ボックス（構文全体を1つのテキストとして表示）
  const fullText = '今日、スタバで' + cat.scene + '大学生がいたから、肩叩いて\n'
    + '「あの、' + cat.prefix + formatted + 'です」\n'
    + 'って言ったら' + reaction.kettara + '\n'
    + '最近' + cat.topic + '人増えてきたけど、やっぱり一般人からしたら' + cat.label + formatted + 'って' + reaction.last;

  const box = document.getElementById('resultBox');
  box.innerHTML = '<div class="result-fulltext">' + fullText.replace(/\n/g, '<br>') + '</div>';

  setTimeout(() => box.classList.add('visible'), delay + 200);
  setTimeout(() => document.getElementById('buttonsArea').classList.add('visible'), delay + 500);

  // シェアボタン（元ネタ構文そのままでシェア）
  let shareText = fullText + '\n\n' + 'https://sodateya-claude.github.io/staba-kata/' + '\n(@claude_sodateya)';

  document.getElementById('shareBtn').href =
    'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText);
}

function retry() {
  document.getElementById('sceneScreen').classList.add('hidden');
  document.getElementById('inputScreen').classList.remove('hidden');
  document.getElementById('resultBox').classList.remove('visible');
  document.getElementById('buttonsArea').classList.remove('visible');
  amountInput.value = '';
  amountInput.focus();
}

</script>
</body>
</html>
