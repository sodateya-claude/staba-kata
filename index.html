<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタバ肩叩きシミュレーター</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: Georgia, 'Times New Roman', serif;
  background: #ffffff;
  color: #111111;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
}
.container {
  width: 100%;
  max-width: 400px;
  padding: 40px 20px 60px;
}
h1 {
  font-size: 1.3rem;
  font-weight: normal;
  letter-spacing: 0.03em;
  margin-bottom: 8px;
}
.subtitle {
  font-size: 0.82rem;
  line-height: 1.7;
  margin-bottom: 48px;
}
.label {
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  margin-bottom: 16px;
}

/* カテゴリ選択 */
.categories {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 36px;
}
.cat-btn {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 0.85rem;
  padding: 10px 16px;
  background: #fff;
  color: #111;
  border: 1.5px solid #111;
  border-radius: 0;
  cursor: pointer;
}
.cat-btn:hover { background: #fff; }
.cat-btn.selected {
  background: #111;
  color: #fff;
}

/* 金額入力 */
.input-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 40px;
}
.amount-input {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 1.8rem;
  width: 100%;
  border: none;
  border-bottom: 1.5px solid #111;
  border-radius: 0;
  outline: none;
  padding: 8px 0;
  background: transparent;
  color: #111;
  -moz-appearance: textfield;
}
.amount-input::-webkit-outer-spin-button,
.amount-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.unit {
  font-size: 1.1rem;
  white-space: nowrap;
}

.tap-btn {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 0.95rem;
  padding: 14px 32px;
  background: #111;
  color: #fff;
  border: 1.5px solid #111;
  border-radius: 0;
  cursor: pointer;
  display: block;
  width: 100%;
}
.tap-btn:hover { background: #111; }
.error-msg {
  font-size: 0.8rem;
  color: #111;
  text-align: center;
  margin-top: 10px;
  min-height: 1.2em;
}

/* シーン画面 */
.scene {
  min-height: 60vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.scene-line {
  font-size: 0.92rem;
  line-height: 1.8;
  margin-bottom: 20px;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.scene-line.visible { opacity: 1; }
.scene-line.dialogue {
  padding-left: 1em;
  text-indent: -1em;
}
.scene-line.reaction {
  font-weight: bold;
}

/* 結果画面 */
.result-box {
  border: 1.5px solid #111;
  padding: 24px 20px;
  margin-top: 20px;
  margin-bottom: 0;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.result-box.visible { opacity: 1; }
.result-fulltext {
  font-size: 0.88rem;
  line-height: 1.9;
}

.buttons-area {
  margin-top: 32px;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.buttons-area.visible { opacity: 1; }
.share-btn {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 0.95rem;
  padding: 14px 32px;
  background: #111;
  color: #fff;
  border: 1.5px solid #111;
  border-radius: 0;
  cursor: pointer;
  display: block;
  width: 100%;
  text-decoration: none;
  text-align: center;
}
.share-btn:hover { background: #111; }
.retry-btn {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 0.9rem;
  padding: 12px 32px;
  background: #fff;
  color: #111;
  border: 1.5px solid #111;
  border-radius: 0;
  cursor: pointer;
  display: block;
  width: 100%;
  margin-top: 10px;
}
.credit {
  font-size: 0.7rem;
  text-align: center;
  margin-top: 32px;
  opacity: 0.5;
}
.hidden { display: none; }
</style>
</head>
<body>
<div class="container">

  <!-- 入力画面 -->
  <div id="inputScreen">
    <h1>スタバ肩叩き<br>シミュレーター</h1>
    <p class="subtitle">
      スタバで大学生がチャートを<br>
      眺めています。<br><br>
      あなたは何を伝えますか？
    </p>

    <div class="label">CATEGORY</div>
    <div class="categories" id="categories"></div>

    <div class="label">AMOUNT</div>
    <div class="input-row">
      <input type="text" class="amount-input" id="amountInput" placeholder="1000" inputmode="numeric">
      <span class="unit">万円</span>
    </div>

    <button class="tap-btn" id="tapBtn" onclick="startScene()">肩を叩く</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- シーン画面 -->
  <div id="sceneScreen" class="hidden">
    <div class="scene" id="sceneArea"></div>
    <div class="result-box" id="resultBox"></div>
    <div class="buttons-area" id="buttonsArea">
      <a class="share-btn" id="shareBtn" target="_blank" rel="noopener">X でシェア</a>
      <button class="retry-btn" onclick="retry()">金額を変えて再挑戦</button>
      <div class="credit">@claude_sodateya</div>
    </div>
  </div>

</div>

<script>
// カテゴリ定義
const cats = [
  { id: 'asset',  label: '資産',   prefix: '自分資産',   scene: 'チャート眺めてる', topic: '投資してる' },
  { id: 'income', label: '年収',   prefix: '自分年収',   scene: '就活サイト見てる', topic: '就活してる' },
  { id: 'loss',   label: '含み損', prefix: '自分含み損',  scene: 'チャート眺めてる', topic: '投資してる' },
  { id: 'debt',   label: '借金',   prefix: '自分借金',   scene: '参考書広げてる',   topic: '借金してる' }
];

// リアクション定義（万円単位）
// kettara: 「って言ったら〜」の部分, last: 「やっぱり〜」の部分
const reactions = {
  asset: [
    { max: -1,     kettara: 'むっちゃ心配してきた',              last: 'マイナスってやばい部類だよね？' },
    { max: 0,      kettara: '意味わからんって顔された',          last: '0円って逆にすごい部類だよね？' },
    { max: 10,     kettara: '聞き返された',                      last: 'まだまだこれからの部類だよね？' },
    { max: 100,    kettara: '目を逸らされた',                    last: 'まだ頑張らないとの部類だよね？' },
    { max: 500,    kettara: 'イヤホン付け直された',              last: 'まあまあの部類だよね？' },
    { max: 1000,   kettara: 'むっちゃ驚いてた',                  last: 'すごい部類だよね？' },
    { max: 3000,   kettara: 'ちょっと引いてた',                  last: 'かなりすごい部類だよね？' },
    { max: 5000,   kettara: '荷物まとめて逃げられた',            last: '怖がられる部類だよね？' },
    { max: 10000,  kettara: '足早に席を移られた',                last: '不審者扱いされる部類だよね？' },
    { max: 100000, kettara: '店員が飛んできた',                  last: '通報される部類だよね？' },
    { max: Infinity, kettara: '警察が来た',                      last: '逮捕される部類だよね？' }
  ],
  income: [
    { max: -1,     kettara: '本気で心配された',                  last: 'マイナスってやばい部類だよね？' },
    { max: 0,      kettara: '「無職ですか？」って聞かれた',      last: '無職ってびっくりされる部類だよね？' },
    { max: 100,    kettara: '「バイトですか？」って言われた',     last: 'バイトレベルの部類だよね？' },
    { max: 300,    kettara: '「普通ですね」って真顔で言われた',   last: '普通の部類だよね？' },
    { max: 500,    kettara: '社交辞令っぽく「いいですね」って言われた', last: 'まあまあの部類だよね？' },
    { max: 800,    kettara: 'むっちゃ驚いてた',                  last: 'すごい部類だよね？' },
    { max: 1500,   kettara: '「なんで僕に言うんですか」って怖がられた', last: '怖がられる部類だよね？' },
    { max: 3000,   kettara: '荷物まとめて逃げられた',            last: '不審者扱いされる部類だよね？' },
    { max: 5000,   kettara: '店員が飛んできた',                  last: '通報される部類だよね？' },
    { max: 10000,  kettara: '店員が警察に電話してた',            last: '事案になる部類だよね？' },
    { max: Infinity, kettara: 'SPが来た',                        last: '要人レベルの部類だよね？' }
  ],
  loss: [
    { max: 0,      kettara: '「プラスなんですか？」って聞き返された', last: '話が噛み合わない部類だよね？' },
    { max: 10,     kettara: '興味なさそうにうなずかれた',         last: '大したことない部類だよね？' },
    { max: 100,    kettara: '「そういうこともありますよ」って慰められた', last: 'あるあるの部類だよね？' },
    { max: 500,    kettara: '「大丈夫ですか？」って心配された',   last: '心配される部類だよね？' },
    { max: 1000,   kettara: 'コーヒー奢ろうとしてきた',          last: '同情される部類だよね？' },
    { max: 3000,   kettara: '言葉を失ってた',                    last: '絶句される部類だよね？' },
    { max: 5000,   kettara: '目が潤んでた',                      last: '他人を泣かせる部類だよね？' },
    { max: 10000,  kettara: '泣いてた。俺の含み損に。',          last: '人を泣かせるレベルの部類だよね？' },
    { max: 50000,  kettara: '震える手で投資アプリをアンインストールしてた', last: '人の人生を変える部類だよね？' },
    { max: Infinity, kettara: 'スタバを出て就職サイトを開いてた', last: '投資をやめさせるレベルの部類だよね？' }
  ],
  debt: [
    { max: 0,      kettara: '「借金ないんですか？」って驚かれた', last: '借金ゼロって逆にすごい部類だよね？' },
    { max: 50,     kettara: '「奨学金ですか？同じです」って共感された', last: 'あるあるの部類だよね？' },
    { max: 300,    kettara: '「みんなありますよ」って慰められた', last: 'まだ普通の部類だよね？' },
    { max: 500,    kettara: '「返せるんですか？」って心配された', last: '心配される部類だよね？' },
    { max: 1000,   kettara: 'コーヒー奢ろうとしてきた',          last: '同情される部類だよね？' },
    { max: 3000,   kettara: '父親の名刺を渡された。弁護士らしい。', last: '法律相談を勧められる部類だよね？' },
    { max: 5000,   kettara: '震えてた',                          last: '人を震えさせる部類だよね？' },
    { max: 10000,  kettara: '「嘘ですよね？」って聞き返された',  last: '信じてもらえない部類だよね？' },
    { max: 50000,  kettara: 'スタバ出てった。人生考え直すらしい。', last: '人の人生観を変える部類だよね？' },
    { max: Infinity, kettara: '泣きながら親に電話してた',        last: '他人を泣かせる部類だよね？' }
  ]
};

let selectedCat = null;

// カテゴリボタン生成
const catEl = document.getElementById('categories');
cats.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn';
  btn.textContent = c.label;
  btn.onclick = () => selectCat(c.id, btn);
  catEl.appendChild(btn);
});

function selectCat(id, btn) {
  selectedCat = id;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// デフォルト選択
selectCat('asset', catEl.children[0]);

const amountInput = document.getElementById('amountInput');

// 金額フォーマット
function formatAmount(num) {
  if (isNaN(num)) num = 0;
  const abs = Math.abs(num);
  if (abs >= 10000) {
    const oku = Math.floor(abs / 10000);
    const man = abs % 10000;
    let s = oku.toLocaleString() + '億';
    if (man > 0) s += man.toLocaleString() + '万';
    return (num < 0 ? '-' : '') + s + '円';
  }
  return num.toLocaleString() + '万円';
}

// リアクション取得
function getReaction(catId, amount) {
  const list = reactions[catId];
  for (const r of list) {
    if (amount <= r.max) return r;
  }
  return list[list.length - 1];
}

// シーン開始
function startScene() {
  var errorEl = document.getElementById('errorMsg');
  errorEl.textContent = '';
  var catId = selectedCat;
  var cat = cats.find(function(c) { return c.id === catId; });
  var raw = amountInput.value.replace(/[^\d\-]/g, '');
  if (raw === '' || raw === '-') {
    errorEl.textContent = '金額を入力してください';
    return;
  }
  var amount = parseInt(raw, 10);
  if (isNaN(amount)) {
    errorEl.textContent = '金額を入力してください';
    return;
  }
  const reaction = getReaction(catId, amount);
  const formatted = formatAmount(amount);

  document.getElementById('inputScreen').classList.add('hidden');
  document.getElementById('sceneScreen').classList.remove('hidden');

  const area = document.getElementById('sceneArea');
  area.innerHTML = '';

  // 元ネタ構文に沿ったシーンを構築
  const lines = [
    { text: '今日、スタバで' + cat.scene + '大学生がいたから、肩叩いて', cls: '' },
    { text: '「あの、' + cat.prefix + formatted + 'です」', cls: 'dialogue' },
    { text: 'って言ったら' + reaction.kettara, cls: 'reaction' },
    { text: '最近' + cat.topic + '人増えてきたけど、やっぱり一般人からしたら' + cat.label + formatted + 'って' + reaction.last, cls: '' }
  ];

  // 台詞を順番に表示
  lines.forEach((l, i) => {
    const div = document.createElement('div');
    div.className = 'scene-line ' + l.cls;
    div.textContent = l.text;
    area.appendChild(div);
  });

  const allLines = area.querySelectorAll('.scene-line');
  let delay = 300;
  allLines.forEach((el, i) => {
    setTimeout(() => el.classList.add('visible'), delay);
    delay += i === 1 ? 800 : 600;
  });

  // 結果ボックス（構文全体を1つのテキストとして表示）
  const fullText = '今日、スタバで' + cat.scene + '大学生がいたから、肩叩いて\n'
    + '「あの、' + cat.prefix + formatted + 'です」\n'
    + 'って言ったら' + reaction.kettara + '\n'
    + '最近' + cat.topic + '人増えてきたけど、やっぱり一般人からしたら' + cat.label + formatted + 'って' + reaction.last;

  const box = document.getElementById('resultBox');
  box.innerHTML = '<div class="result-fulltext">' + fullText.replace(/\n/g, '<br>') + '</div>';

  setTimeout(() => box.classList.add('visible'), delay + 200);
  setTimeout(() => document.getElementById('buttonsArea').classList.add('visible'), delay + 500);

  // シェアボタン（元ネタ構文そのままでシェア）
  let shareText = fullText + '\n\n' + 'https://sodateya-claude.github.io/staba-kata/' + '\n(@claude_sodateya)';

  document.getElementById('shareBtn').href =
    'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText);
}

function retry() {
  document.getElementById('sceneScreen').classList.add('hidden');
  document.getElementById('inputScreen').classList.remove('hidden');
  document.getElementById('resultBox').classList.remove('visible');
  document.getElementById('buttonsArea').classList.remove('visible');
  amountInput.value = '';
  amountInput.focus();
}

</script>
</body>
</html>
